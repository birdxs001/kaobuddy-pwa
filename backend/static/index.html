<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#28524f" />
    <title>考搭子 KaoBuddy</title>
    <style>
      :root {
        color: #17211f;
        background: #f6f5ef;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      main { width: min(1120px, 100%); margin: 0 auto; padding: 16px; }
      header {
        min-height: 250px;
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 18px;
        align-items: end;
        padding: 34px 0 22px;
        border-bottom: 1px solid #d8d2c2;
      }
      h1 { margin: 0; font-size: clamp(48px, 12vw, 98px); line-height: .95; letter-spacing: 0; }
      h2 { margin: 0 0 12px; font-size: 20px; letter-spacing: 0; }
      p { line-height: 1.7; }
      .eyebrow { margin: 0 0 8px; color: #b24d34; font-weight: 800; }
      .hero-text { max-width: 720px; color: #3b4844; font-size: 17px; }
      .hero-card, section {
        border: 1px solid #d8d2c2;
        background: #fffdf7;
        border-radius: 8px;
        padding: 16px;
      }
      .hero-card { display: grid; gap: 8px; }
      .hero-card strong { font-size: 28px; }
      .status {
        margin: 16px 0;
        padding: 12px 14px;
        border-left: 4px solid #28524f;
        background: #e7eee9;
        border-radius: 6px;
      }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin: 14px 0; }
      label { display: grid; gap: 7px; margin: 10px 0; font-weight: 700; color: #37433f; }
      input, textarea, select {
        width: 100%;
        border: 1px solid #c8c4b5;
        border-radius: 6px;
        padding: 11px 12px;
        background: #fff;
        color: #17211f;
        font: inherit;
      }
      textarea { min-height: 104px; resize: vertical; line-height: 1.6; }
      button {
        border: 0;
        border-radius: 6px;
        padding: 11px 14px;
        min-height: 44px;
        color: #fff;
        background: #28524f;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
      button.secondary { color: #28524f; background: #e4ebe5; }
      button.warn { background: #b24d34; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip { color: #28524f; background: #e4ebe5; border: 1px solid #c8d3cd; }
      .chip.active { color: #fff; background: #b24d34; }
      .list { display: grid; gap: 10px; max-height: 520px; overflow: auto; }
      .item { padding: 12px; border: 1px solid #e4e0d2; border-radius: 8px; background: #f6f5ef; }
      .item p { margin: 8px 0 0; white-space: pre-wrap; overflow-wrap: anywhere; }
      .muted, small { color: #68736f; }
      .note p { max-height: 340px; overflow: auto; }
      @media (max-width: 760px) {
        main { padding: 12px; }
        header, .grid { grid-template-columns: 1fr; }
        header { min-height: 330px; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">KaoBuddy</p>
          <h1>考搭子</h1>
          <p class="hero-text">把课件、笔记、PDF、手写照片和视频字幕收进来，用你自己的 AI API 做计划、讲重点、刷题和模考。</p>
        </div>
        <div class="hero-card">
          <span class="muted">当前项目</span>
          <strong id="currentProject">还没创建</strong>
          <small id="countdown">先建一个考试项目</small>
        </div>
      </header>

      <div id="status" class="status">准备好了。</div>

      <div class="grid">
        <section>
          <h2>API 设置</h2>
          <label>平台
            <select id="preset">
              <option value="deepseek">DeepSeek</option>
              <option value="kimi-cn">Kimi 国内</option>
              <option value="kimi-global">Kimi 国际</option>
              <option value="openai">OpenAI</option>
              <option value="custom">自定义</option>
            </select>
          </label>
          <label>Base URL <input id="baseUrl" value="https://api.deepseek.com" /></label>
          <label>Model <input id="model" value="deepseek-chat" /></label>
          <label>API Key <input id="apiKey" type="password" placeholder="只保存在当前浏览器" /></label>
          <div class="actions">
            <button id="saveApi">保存配置</button>
            <button class="secondary" id="testApi">测试连接</button>
          </div>
        </section>

        <section>
          <h2>考试项目</h2>
          <label>科目 <input id="subject" placeholder="比如 高数 / 法考 / 期末英语" /></label>
          <label>考试日期 <input id="examDate" type="date" /></label>
          <label>每天能学多久（分钟） <input id="dailyMinutes" type="number" value="120" min="10" /></label>
          <label>目标分数 <input id="targetScore" placeholder="可不填" /></label>
          <label>薄弱项 <textarea id="weakPoints" placeholder="可不填，后面可以让 AI 推断"></textarea></label>
          <button id="createProject">创建项目</button>
        </section>
      </div>

      <section>
        <h2>项目切换</h2>
        <div id="projectChips" class="chips"></div>
      </section>

      <div class="grid">
        <section>
          <h2>资料导入</h2>
          <label>资料标题 <input id="materialTitle" placeholder="课件、往年题、复习提纲..." /></label>
          <label>文本 / Markdown <textarea id="materialText" placeholder="直接粘贴资料内容"></textarea></label>
          <div class="actions">
            <button id="saveText">保存文本资料</button>
            <input id="fileInput" type="file" accept=".txt,.md,.markdown,.pdf,text/plain,application/pdf" />
          </div>
          <small>PDF 第一版会保存文件名和提示；如果要让 AI 使用 PDF 内容，建议先复制文字或导出 TXT。</small>
        </section>

        <section>
          <h2>手写笔记和视频</h2>
          <label>手写说明 <input id="handHint" placeholder="比如 第三章极限笔记" /></label>
          <label>手写图片 <input id="handInput" type="file" accept="image/*" multiple /></label>
          <label>视频链接 <input id="videoUrl" placeholder="https://www.bilibili.com/video/..." /></label>
          <div class="actions">
            <button id="importHand">识别手写笔记</button>
            <button id="importVideo">导入视频字幕</button>
          </div>
        </section>
      </div>

      <section>
        <h2>AI 工作流</h2>
        <label>这次想强调什么 <textarea id="extra" placeholder="比如 只剩 3 天，优先救选择题；或者按零基础讲。"></textarea></label>
        <div class="actions">
          <button data-mode="plan">生成计划</button>
          <button data-mode="teach">开始讲解</button>
          <button data-mode="practice">生成/批改练习</button>
          <button data-mode="mock-exam">生成模考</button>
        </div>
      </section>

      <div class="grid">
        <section>
          <h2>资料库</h2>
          <div id="materials" class="list"></div>
        </section>
        <section>
          <h2>AI 结果</h2>
          <div id="notes" class="list"></div>
        </section>
      </div>

      <section>
        <h2>备份</h2>
        <div class="actions">
          <button id="exportData">导出 JSON</button>
          <input id="importData" type="file" accept="application/json,.json" />
          <button class="warn" id="clearData">清空本地数据</button>
        </div>
      </section>
    </main>

    <script>
      const presets = {
        "deepseek": ["https://api.deepseek.com", "deepseek-chat"],
        "kimi-cn": ["https://api.moonshot.cn/v1", "moonshot-v1-8k"],
        "kimi-global": ["https://api.moonshot.ai/v1", "moonshot-v1-8k"],
        "openai": ["https://api.openai.com/v1", "gpt-4.1-mini"],
        "custom": ["https://", ""]
      };
      const state = {
        projects: JSON.parse(localStorage.getItem("kaobuddy-projects") || "[]"),
        materials: JSON.parse(localStorage.getItem("kaobuddy-materials") || "[]"),
        notes: JSON.parse(localStorage.getItem("kaobuddy-notes") || "[]"),
        activeProjectId: localStorage.getItem("kaobuddy-active-project") || ""
      };
      const $ = (id) => document.getElementById(id);
      const status = (text) => $("status").textContent = text;
      const uid = (prefix) => `${prefix}_${crypto.randomUUID()}`;
      const save = () => {
        localStorage.setItem("kaobuddy-projects", JSON.stringify(state.projects));
        localStorage.setItem("kaobuddy-materials", JSON.stringify(state.materials));
        localStorage.setItem("kaobuddy-notes", JSON.stringify(state.notes));
        localStorage.setItem("kaobuddy-active-project", state.activeProjectId || "");
      };
      const activeProject = () => state.projects.find((p) => p.id === state.activeProjectId) || state.projects[0];
      const apiConfig = () => ({
        provider_name: $("preset").selectedOptions[0].textContent,
        base_url: $("baseUrl").value.trim(),
        api_key: $("apiKey").value.trim(),
        model: $("model").value.trim(),
        temperature: 0.4,
        max_tokens: 1800
      });
      function loadApi() {
        const raw = localStorage.getItem("kaobuddy-api-config");
        if (!raw) return;
        const config = JSON.parse(raw);
        $("baseUrl").value = config.base_url || "";
        $("model").value = config.model || "";
        $("apiKey").value = config.api_key || "";
      }
      function daysLeft(date) {
        if (!date) return "-";
        return Math.max(0, Math.ceil((new Date(`${date}T23:59:59`) - new Date()) / 86400000));
      }
      function render() {
        const project = activeProject();
        if (project && !state.activeProjectId) state.activeProjectId = project.id;
        $("currentProject").textContent = project ? project.subject : "还没创建";
        $("countdown").textContent = project ? `距离考试 ${daysLeft(project.exam_date)} 天` : "先建一个考试项目";
        $("projectChips").innerHTML = state.projects.map((p) => `<button class="chip ${p.id === state.activeProjectId ? "active" : ""}" data-project="${p.id}">${p.subject}</button>`).join("") || "<span class='muted'>还没有项目。</span>";
        const scopedMaterials = state.materials.filter((m) => project && m.project_id === project.id);
        $("materials").innerHTML = scopedMaterials.map((m) => `<article class="item"><strong>${escapeHtml(m.title)}</strong><small>${m.kind}</small><p>${escapeHtml((m.content || "").slice(0, 320))}</p></article>`).join("") || "<p class='muted'>还没有资料。</p>";
        const scopedNotes = state.notes.filter((n) => project && n.project_id === project.id);
        $("notes").innerHTML = scopedNotes.map((n) => `<article class="item note"><strong>${escapeHtml(n.title)}</strong><p>${escapeHtml(n.content)}</p></article>`).join("") || "<p class='muted'>生成的计划、讲解、练习会出现在这里。</p>";
        save();
      }
      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
      }
      async function postJson(url, body) {
        const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.detail || "请求失败");
        return data;
      }
      function projectPayload(project) {
        return {
          subject: project.subject,
          exam_date: project.exam_date,
          daily_minutes: Number(project.daily_minutes),
          target_score: project.target_score,
          weak_points: project.weak_points
        };
      }
      function materialPayload(project) {
        return state.materials.filter((m) => m.project_id === project.id).map(({ title, kind, content }) => ({ title, kind, content }));
      }
      function fileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }
      $("preset").onchange = () => {
        const [baseUrl, model] = presets[$("preset").value];
        $("baseUrl").value = baseUrl;
        $("model").value = model;
      };
      $("saveApi").onclick = () => {
        localStorage.setItem("kaobuddy-api-config", JSON.stringify(apiConfig()));
        status("API 配置已保存到当前浏览器。");
      };
      $("testApi").onclick = async () => {
        try {
          status("正在测试连接...");
          const data = await postJson("/api/ai/test", {
            api_config: apiConfig(),
            messages: [{ role: "user", content: "请只回复：连接成功" }]
          });
          localStorage.setItem("kaobuddy-api-config", JSON.stringify(apiConfig()));
          status(`连接测试完成：${data.content}`);
        } catch (error) {
          status(error.message);
        }
      };
      $("createProject").onclick = () => {
        const project = {
          id: uid("project"),
          subject: $("subject").value.trim(),
          exam_date: $("examDate").value,
          daily_minutes: Number($("dailyMinutes").value || 120),
          target_score: $("targetScore").value.trim(),
          weak_points: $("weakPoints").value.trim(),
          created_at: new Date().toISOString()
        };
        if (!project.subject || !project.exam_date) return status("科目和考试日期要填一下。");
        state.projects.unshift(project);
        state.activeProjectId = project.id;
        status("考试项目已创建。");
        render();
      };
      $("projectChips").onclick = (event) => {
        const id = event.target.dataset.project;
        if (!id) return;
        state.activeProjectId = id;
        render();
      };
      $("saveText").onclick = () => {
        const project = activeProject();
        if (!project) return status("先创建一个考试项目。");
        const content = $("materialText").value.trim();
        if (!content) return status("先粘贴一点资料内容。");
        state.materials.unshift({
          id: uid("material"),
          project_id: project.id,
          title: $("materialTitle").value.trim() || "手动资料",
          kind: content.includes("#") ? "markdown" : "text",
          content,
          created_at: new Date().toISOString()
        });
        $("materialTitle").value = "";
        $("materialText").value = "";
        status("资料已保存。");
        render();
      };
      $("fileInput").onchange = async (event) => {
        const project = activeProject();
        const file = event.target.files[0];
        if (!project || !file) return;
        const lower = file.name.toLowerCase();
        let content = "";
        let kind = "file";
        if (lower.endsWith(".txt") || lower.endsWith(".md") || lower.endsWith(".markdown")) {
          content = await file.text();
          kind = lower.endsWith(".md") || lower.endsWith(".markdown") ? "markdown" : "file";
        } else {
          content = "PDF 已记录。第一版直接打开版本暂不解析 PDF 内容，可以复制 PDF 文字后作为文本资料保存。";
          kind = "pdf";
        }
        state.materials.unshift({ id: uid("material"), project_id: project.id, title: file.name, kind, content, created_at: new Date().toISOString() });
        status(`${file.name} 已保存到资料库。`);
        render();
      };
      $("importHand").onclick = async () => {
        const project = activeProject();
        const files = Array.from($("handInput").files || []).slice(0, 6);
        if (!project) return status("先创建一个考试项目。");
        if (!files.length) return status("先选择手写图片。");
        try {
          status("正在识别手写笔记...");
          const image_data_urls = await Promise.all(files.map(fileAsDataUrl));
          const data = await postJson("/api/ocr/handwriting", { api_config: apiConfig(), image_data_urls, note_hint: $("handHint").value.trim() });
          state.materials.unshift({ id: uid("material"), project_id: project.id, title: $("handHint").value.trim() || "手写笔记", kind: "handwriting", content: data.content, created_at: new Date().toISOString() });
          status("手写笔记已识别并保存。");
          render();
        } catch (error) {
          status(error.message);
        }
      };
      $("importVideo").onclick = async () => {
        const project = activeProject();
        if (!project) return status("先创建一个考试项目。");
        if (!$("videoUrl").value.trim()) return status("先粘贴视频链接。");
        try {
          status("正在读取视频公开信息...");
          const data = await postJson("/api/video/import", { url: $("videoUrl").value.trim() });
          const content = [data.description, data.subtitles].filter(Boolean).join("\\n\\n") || "没有抓到公开字幕，请手动补充课程重点。";
          state.materials.unshift({ id: uid("material"), project_id: project.id, title: data.title || "视频资料", kind: "video", content, source_url: data.source_url, created_at: new Date().toISOString() });
          status((data.warnings && data.warnings[0]) || "视频资料已保存。");
          render();
        } catch (error) {
          status(error.message);
        }
      };
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.onclick = async () => {
          const project = activeProject();
          if (!project) return status("先创建一个考试项目。");
          const mode = button.dataset.mode;
          const titles = { plan: "冲刺计划", teach: "考点讲解", practice: "练习反馈", "mock-exam": "短模考" };
          try {
            status(`正在生成${titles[mode]}...`);
            const endpoint = mode === "mock-exam" ? "/api/ai/mock-exam" : `/api/ai/${mode}`;
            const data = await postJson(endpoint, {
              api_config: apiConfig(),
              project: projectPayload(project),
              materials: materialPayload(project),
              extra: $("extra").value.trim()
            });
            state.notes.unshift({ id: uid("note"), project_id: project.id, mode, title: titles[mode], content: data.content, created_at: new Date().toISOString() });
            status(`${titles[mode]}已生成。`);
            render();
          } catch (error) {
            status(error.message);
          }
        };
      });
      $("exportData").onclick = () => {
        const data = JSON.stringify({ version: 1, exported_at: new Date().toISOString(), projects: state.projects, materials: state.materials, notes: state.notes }, null, 2);
        const url = URL.createObjectURL(new Blob([data], { type: "application/json" }));
        const link = document.createElement("a");
        link.href = url;
        link.download = `kaobuddy-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(url);
      };
      $("importData").onchange = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const data = JSON.parse(await file.text());
        state.projects = data.projects || [];
        state.materials = data.materials || [];
        state.notes = data.notes || [];
        state.activeProjectId = state.projects[0]?.id || "";
        status("备份已导入。");
        render();
      };
      $("clearData").onclick = () => {
        if (!confirm("确定清空当前浏览器里的考搭子数据吗？")) return;
        state.projects = [];
        state.materials = [];
        state.notes = [];
        state.activeProjectId = "";
        save();
        render();
        status("本地数据已清空。");
      };
      loadApi();
      render();
    </script>
  </body>
</html>
